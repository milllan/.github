name: Debug Secret

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Report secret length (value masked)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          echo "openrouter_key_len=${#OPENROUTER_API_KEY}"
          echo "trailing_newline_check: [${OPENROUTER_API_KEY}]"
