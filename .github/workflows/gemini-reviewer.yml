name: Gemini Code Reviewer

# Reusable workflow: other repos reference it via
#   uses: milllan/.github/.github/workflows/gemini-reviewer.yml@<sha>
# Triggered by a caller workflow on pull_request events. For manual re-review,
# the caller's workflow_dispatch job pushes an empty commit to the PR branch,
# which re-fires the pull_request:synchronize trigger that calls this workflow.
on:
  workflow_call:
    inputs:
      provider:
        description: "Review backend: 'gemini' (Google Generative Language API), 'openai' (any OpenAI-compatible endpoint, e.g. Z.ai GLM, DeepSeek), 'openrouter' (OpenRouter, OpenAI-compatible), 'nim' (NVIDIA NIM, OpenAI-compatible, e.g. z-ai/glm-5.2), or 'zen' (OpenCode Zen gateway, OpenAI-compatible, e.g. deepseek-v4-flash-free, mimo-v2.5-free)."
        type: string
        default: "gemini"
      model:
        description: "Model name for the chosen provider (e.g. gemini-3.5-flash, glm-5.2, tencent/hy3:free, z-ai/glm-5.2, deepseek-v4-flash-free). For provider 'openai'/'openrouter'/'nim'/'zen' this is the first model tried; see 'models' for a fallback list."
        type: string
        default: "gemini-3.5-flash"
      models:
        description: "Space- or comma-separated fallback list of models for provider 'openai'/'openrouter'/'nim'/'zen'. Tried in order; the next model is used if one is removed/deprecated (HTTP 400/404/422) or all retries fail. If empty, only 'model' is used."
        type: string
        default: ""
      openai_endpoint:
        description: "OpenAI-compatible chat-completions endpoint for provider 'openai'. Defaults to Z.ai's Coding Plan endpoint (subscription). For 'openrouter' use 'openrouter_endpoint' instead."
        type: string
        default: "https://api.z.ai/api/coding/paas/v4/chat/completions"
      openrouter_endpoint:
        description: "Chat-completions endpoint for provider 'openrouter'. Defaults to https://openrouter.ai/api/v1/chat/completions. Override only if you self-host or proxy OpenRouter."
        type: string
        default: "https://openrouter.ai/api/v1/chat/completions"
      nim_endpoint:
        description: "Chat-completions endpoint for provider 'nim'. Defaults to https://integrate.api.nvidia.com/v1/chat/completions (NVIDIA NIM). Override only if you self-host or proxy NIM."
        type: string
        default: "https://integrate.api.nvidia.com/v1/chat/completions"
      zen_endpoint:
        description: "Chat-completions endpoint for provider 'zen'. Defaults to https://opencode.ai/zen/v1/chat/completions (OpenCode Zen gateway). Override only if you self-host or proxy Zen."
        type: string
        default: "https://opencode.ai/zen/v1/chat/completions"
      max_diff_chars:
        description: "Skip the review if the raw diff exceeds this many characters (cost guard). 0 disables the limit."
        type: number
        default: 250000
    secrets:
      GEMINI_API_KEY:
        required: false
      OPENAI_API_KEY:
        description: "API key for the openai-compatible provider (e.g. Z.ai key when endpoint is Z.ai)."
        required: false
      OPENROUTER_API_KEY:
        description: "API key for the openrouter provider (https://openrouter.ai)."
        required: false
      NVIDIA_API_KEY:
        description: "API key for the nim provider (NVIDIA NIM, https://build.nvidia.com). Get one at https://build.nvidia.com/settings/api-keys."
        required: false
      OPENCODE_API_KEY:
        description: "API key for the zen provider (OpenCode Zen gateway, https://opencode.ai). Get one at https://opencode.ai/auth or https://opencode.ai/zen."
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: ${{ inputs.provider }} review (${{ inputs.model }})
    runs-on: ubuntu-latest
    # GitHub does NOT support `timeout-minutes` on the *caller* job that uses
    # `uses:` to invoke a reusable workflow (see community/discussions/50481) —
    # setting it there silently rejects the workflow as a "file issue" with no
    # error message. It must live here on the called job. Hardcoded rather than
    # an expression because timeout-minutes only accepts a literal number
    # (actions/runner#1555).
    #
    # Budget math: 15min job = 900s. Per-request curl --max-time is 400s, so
    # ~2 thinking attempts + backoff (10s+20s) fit; non-thinking providers
    # (gemini/openai/openrouter/zen) fit all 4 retries easily. A single
    # thinking attempt may not finish the largest diffs in 400s — that's the
    # accepted tradeoff for keeping retry honest (a 900s --max-time would make
    # the retry loop dead code, since one slow attempt would hit the job wall).
    # See reviewer-scorecard.md #14 for the history.
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history so the base ref is available for an accurate diff.

      - name: Generate PR Diff
        id: pr-diff
        env:
          BASE_REF: ${{ github.base_ref }}
          MAX_DIFF_CHARS: ${{ inputs.max_diff_chars }}
        run: |
          # Ensure the base ref exists locally (shallow/PR checkouts can miss it).
          git fetch origin "${BASE_REF}" --depth=1 2>/dev/null || true
          git diff "origin/${BASE_REF}...HEAD" > pr_diff.txt
          size=$(wc -c < pr_diff.txt)
          if [ "$size" -eq 0 ]; then
            echo "Empty diff — nothing to review."
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "skip_reason=Empty diff — nothing to review." >> $GITHUB_OUTPUT
            exit 0
          fi
          # Cost guard: bail on enormous diffs rather than burning the model.
          if [ "${MAX_DIFF_CHARS}" != "0" ] && [ "$size" -gt "${MAX_DIFF_CHARS}" ]; then
            echo "Diff is ${size} bytes (limit ${MAX_DIFF_CHARS}) — skipping review to control cost."
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "skip_reason=Diff is $(printf "%'d" "$size") bytes, which exceeds the $(printf "%'d" "${MAX_DIFF_CHARS}") char cost guard. Raise \`max_diff_chars\` or split the PR to get this reviewed." >> $GITHUB_OUTPUT
            exit 0
          fi

      - name: Run Review
        id: review-step
        if: steps.pr-diff.outputs.skip != 'true'
        env:
          PROVIDER: ${{ inputs.provider }}
          MODEL: ${{ inputs.model }}
          MODELS: ${{ inputs.models }}
          OPENAI_ENDPOINT: ${{ inputs.openai_endpoint }}
          OPENROUTER_ENDPOINT: ${{ inputs.openrouter_endpoint }}
          NIM_ENDPOINT: ${{ inputs.nim_endpoint }}
          ZEN_ENDPOINT: ${{ inputs.zen_endpoint }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          set +e

          # ---- Shared error-reporting helpers ----
          # Centralizes the provider-agnostic failure comment so each branch
          # doesn't re-implement the same formatting. All branches only format
          # LABEL/http_code/attempt/msg.
          get_error_msg() {  # no args; reads response.json, echoes extracted message
            jq -r '.error.message // .error // "(no error body)"' response.json 2>/dev/null || head -c 500 response.json
          }
          fail_fast() {  # $1=http_code $2=attempt $3=msg
            # Emit msg with a separate '%s' printf so any '%' in the message is
            # not interpreted as a format specifier.
            {
              printf '## %s Code Review\n\n:warning: API returned HTTP %s after %s attempt(s): ' "$LABEL" "$1" "$2"
              printf '%s\n' "$3"
            } > review_report.md
            echo "status=error" >> "$GITHUB_OUTPUT"
            exit 0
          }

          # ---- Resolve provider label, endpoint, and API key ----
          case "$PROVIDER" in
            gemini)
              LABEL="Gemini"
              ENDPOINT=""
              KEY="$GEMINI_API_KEY"
              ;;
            openai)
              LABEL="GLM"
              ENDPOINT="${OPENAI_ENDPOINT:-https://api.z.ai/api/coding/paas/v4/chat/completions}"
              KEY="$OPENAI_API_KEY"
              ;;
            openrouter)
              LABEL="OpenRouter"
              ENDPOINT="${OPENROUTER_ENDPOINT:-https://openrouter.ai/api/v1/chat/completions}"
              KEY="$OPENROUTER_API_KEY"
              ;;
            nim)
              LABEL="NVIDIA NIM"
              ENDPOINT="${NIM_ENDPOINT:-https://integrate.api.nvidia.com/v1/chat/completions}"
              KEY="$NVIDIA_API_KEY"
              ;;
            zen)
              LABEL="OpenCode Zen"
              ENDPOINT="${ZEN_ENDPOINT:-https://opencode.ai/zen/v1/chat/completions}"
              KEY="$OPENCODE_API_KEY"
              ;;
            *)
              LABEL="$PROVIDER"
              ENDPOINT=""
              KEY=""
              ;;
          esac

          # ---- Build the fallback model list ----
          # `models` (space/comma separated) takes precedence; otherwise the
          # single `model` input is used. Fallback only matters for OpenAI-
          # compatible providers, but it is built for all (harmless for gemini,
          # which carries a single entry).
          if [ -n "$MODELS" ]; then
            MODEL_LIST=()
            for m in $MODELS; do
              [ -n "$m" ] && MODEL_LIST+=("$m")
            done
            # If the list resolved to nothing (e.g. only separators), fall back to `model`.
            [ "${#MODEL_LIST[@]}" -eq 0 ] && MODEL_LIST=("$MODEL")
          else
            MODEL_LIST=("$MODEL")
          fi

          # ---- Build the request body for the chosen provider ----
          # jq --rawfile loads the diff safely so its contents (quotes, backticks,
          # $) cannot break JSON parsing or inject into the prompt.
          build_body() {
            case "$PROVIDER" in
              gemini)
                jq -n --rawfile diff pr_diff.txt '{
                  system_instruction: { parts: [ { text: "You are an expert software engineer performing a pull request code review. Be concrete and concise. Output GitHub-flavored Markdown only. Start with a one-line summary, then sections: Critical, Suggestions, Nitpicks. Cite file paths and line ranges from the diff. If you have no concerns in a section, write \"None\". Do not restate the diff." } ] },
                  contents: [ { role: "user", parts: [ { text: ("Review the following git diff for bugs, security/safety hazards, performance issues, logic flaws, and coding-standard violations. Suggest concrete fixes with code snippets where useful.\n\n```diff\n" + $diff + "\n```") } ] } ],
                  generationConfig: { temperature: 0.2 }
                }' > body.json
                ;;
              openai|openrouter|zen)
                jq -n --rawfile diff pr_diff.txt --arg model "$MODEL" '{
                  model: $model,
                  messages: [
                    { role: "system", content: "You are an expert software engineer performing a pull request code review. Be concrete and concise. Output GitHub-flavored Markdown only. Start with a one-line summary, then sections: Critical, Suggestions, Nitpicks. Cite file paths and line ranges from the diff. If you have no concerns in a section, write \"None\". Do not restate the diff." },
                    { role: "user", content: ("Review the following git diff for bugs, security/safety hazards, performance issues, logic flaws, and coding-standard violations. Suggest concrete fixes with code snippets where useful.\n\n```diff\n" + $diff + "\n```") }
                  ],
                  temperature: 0.2
                }' > body.json
                ;;
              nim)
                # NVIDIA NIM models use one of several thinking schemas — there is
                # no single magic flag, and NIM silently ignores unknown keys (so
                # the wrong flag is silently a no-op, never an error).
                #
                # Schemas below are verified by DIRECT curl probes against
                # integrate.api.nvidia.com with a real key (2026-07-21), not by
                # reading docs alone. NIM's docs and its deployed runtime disagree
                # on several models — see AGENTS.md "NIM thinking schemas" and
                # "Known limitations / gotchas". CI-only verification is
                # unreliable because GitHub runners and home/office IPs hit
                # different NIM backends with different model availability.
                #
                # Verified schemas (all return HTTP 200 with thinking ON):
                #   z-ai/glm-5.2                  -> chat_template_kwargs.enable_thinking
                #   minimaxai/minimax-m3          -> chat_template_kwargs.thinking_mode:"enabled"
                #   thinkingmachines/inkling      -> top-level reasoning_effort:"high"
                #   deepseek-ai/deepseek-v4-pro   -> chat_template_kwargs.thinking:true
                #   deepseek-ai/deepseek-v4-flash -> chat_template_kwargs.thinking:true
                #   stepfun-ai/step-3.7-flash     -> chat_template_kwargs.thinking:true (REQUIRED — plain body hangs)
                #
                # Verified broken (as of 2026-07-21):
                #   moonshotai/kimi-k2.6          -> HTTP 404 "Not found for account" (entitlement, not param)
                #
                case "$MODEL" in
                  z-ai/glm-5.2)
                    nim_extras='{"chat_template_kwargs":{"enable_thinking":true,"clear_thinking":true}}'
                    ;;
                  minimaxai/minimax-m3)
                    nim_extras='{"chat_template_kwargs":{"thinking_mode":"enabled"}}'
                    ;;
                  thinkingmachines/inkling)
                    nim_extras='{"reasoning_effort":"high"}'
                    ;;
                  deepseek-ai/deepseek-v4-pro|deepseek-ai/deepseek-v4-flash|stepfun-ai/step-3.7-flash)
                    nim_extras='{"chat_template_kwargs":{"thinking":true}}'
                    ;;
                  *)
                    nim_extras='{}'
                    ;;
                esac
                # Build the shared body then merge the per-model extras with `*`,
                # so the 8-line messages block isn't duplicated per schema.
                jq -n --rawfile diff pr_diff.txt \
                     --arg model "$MODEL" \
                     --argjson extras "$nim_extras" '{
                  model: $model,
                  messages: [
                    { role: "system", content: "You are an expert software engineer performing a pull request code review. Be concrete and concise. Output GitHub-flavored Markdown only. Start with a one-line summary, then sections: Critical, Suggestions, Nitpicks. Cite file paths and line ranges from the diff. If you have no concerns in a section, write \"None\". Do not restate the diff." },
                    { role: "user", content: ("Review the following git diff for bugs, security/safety hazards, performance issues, logic flaws, and coding-standard violations. Suggest concrete fixes with code snippets where useful.\n\n```diff\n" + $diff + "\n```") }
                  ],
                  temperature: 0.2
                } * $extras' > body.json
                ;;
              *)
                printf '## %s Code Review\n\n:warning: Unknown provider "%s".\n' "$LABEL" "$PROVIDER" > review_report.md
                echo "status=error" >> $GITHUB_OUTPUT
                exit 0
                ;;
            esac
          }

          # ---- Call the provider, trying each model until one succeeds ----
          # Outer loop: models. Inner loop: up to 4 attempts with transient retry.
          #  - 502/503/504 and transient 429 -> retry the same model.
          #  - 400/404/422 (model removed/deprecated) -> skip to the next model.
          #  - 401/403 and permanent 429 (balance/quota/key) -> fail fast, since
          #    the key is shared and other models would fail identically.
          max_attempts=4
          used_model=""
          last_error=""
          for MODEL in "${MODEL_LIST[@]}"; do
            build_body
            attempt=1
            http_code=""
            while [ "$attempt" -le "$max_attempts" ]; do
              case "$PROVIDER" in
                gemini)
                  http_code=$(curl -sS -w "%{http_code}" -o response.json \
                    --connect-timeout 10 --max-time 400 \
                    -X POST "https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${KEY}" \
                    -H 'Content-Type: application/json' \
                    -d @body.json)
                  ;;
                openai|openrouter|nim|zen)
                  http_code=$(curl -sS -w "%{http_code}" -o response.json \
                    --connect-timeout 10 --max-time 400 \
                    -X POST "${ENDPOINT}" \
                    -H "Authorization: Bearer ${KEY}" \
                    -H 'Content-Type: application/json' \
                    -d @body.json)
                  ;;
              esac

              if [ "$http_code" = "200" ]; then
                used_model="$MODEL"
                break 2
              fi

              retry=no
              unavailable=no
              fatal=no
              case "$http_code" in
                000|502|503|504)
                  # 000 = curl-level failure (DNS, connection refused, timeout
                  # before any HTTP response). Transient — retry like 5xx.
                  retry=yes
                  ;;
                429)
                  # Peek at the body: permanent 429s mention balance/quota/billing/key.
                  body_hint=$(jq -r '(.error.message // .error // "") | ascii_downcase' response.json 2>/dev/null || echo "")
                  case "$body_hint" in
                    *balance*|*recharge*|*quota*|*billing*|*limit*:*\ 0*|*invalid*key*|*unauthorized*)
                      fatal=yes
                      ;;
                    *)
                      retry=yes
                      ;;
                  esac
                  ;;
                401|403)
                  fatal=yes
                  ;;
                400|404|422)
                  unavailable=yes
                  ;;
              esac

              if [ "$fatal" = "yes" ]; then
                fail_fast "$http_code" "$attempt" "$(get_error_msg)"
              fi

              if [ "$unavailable" = "yes" ]; then
                msg=$(get_error_msg)
                echo "Model '$MODEL' unavailable (HTTP $http_code): $msg — trying next model."
                last_error="Model '$MODEL' unavailable (HTTP $http_code): $msg"
                break
              fi

              if [ "$retry" = "yes" ]; then
                wait_s=$((10 * attempt))
                echo "HTTP $http_code on attempt $attempt/$max_attempts — retrying in ${wait_s}s..."
                sleep "$wait_s"
                attempt=$((attempt + 1))
                continue
              fi

              # Any other non-200 code: treat as a hard failure.
              fail_fast "$http_code" "$attempt" "$(get_error_msg)"
            done

            if [ -z "$used_model" ]; then
              if [ -z "$last_error" ]; then
                last_error="Model '$MODEL' failed after $max_attempts attempt(s) (HTTP $http_code)."
              else
                last_error="$last_error; Model '$MODEL' failed after $max_attempts attempt(s) (HTTP $http_code)."
              fi
            fi
          done

          if [ -z "$used_model" ]; then
            printf '## %s Code Review\n\n:warning: All models failed. Last error: %s\n' "$LABEL" "$last_error" > review_report.md
            echo "status=error" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ---- Extract the review text (response shape differs per provider) ----
          case "$PROVIDER" in
            gemini)
              review=$(jq -r '.candidates[0].content.parts[0].text // empty' response.json)
              reason=$(jq -r '.candidates[0].finishReason // .promptFeedback.blockReason // "unknown"' response.json)
              ;;
            openai|openrouter|nim|zen)
              review=$(jq -r '.choices[0].message.content // empty' response.json)
              # Reasoning models (e.g. mimo-v2.5-free) may return content:null
              # with the text under .reasoning — fall back to that so the
              # reviewer still produces a comment.
              if [ -z "$review" ]; then
                review=$(jq -r '.choices[0].message.reasoning // empty' response.json)
              fi
              reason=$(jq -r '.choices[0].finish_reason // "unknown"' response.json)
              ;;
          esac

          if [ -z "$review" ]; then
            printf '## %s Code Review\n\n:warning: %s returned no content (%s).\n' "$LABEL" "$LABEL" "$reason" > review_report.md
            echo "status=empty" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$PROVIDER" = "openai" ] || [ "$PROVIDER" = "openrouter" ] || [ "$PROVIDER" = "nim" ] || [ "$PROVIDER" = "zen" ]; then
            { printf '## %s Code Review (%s)\n\n' "$LABEL" "$used_model"; printf '%s\n' "$review"; } > review_report.md
          else
            { printf '## %s Code Review\n\n' "$LABEL"; printf '%s\n' "$review"; } > review_report.md
          fi
          echo "status=ok" >> $GITHUB_OUTPUT

      - name: Build skip comment
        if: steps.pr-diff.outputs.skip == 'true'
        env:
          SKIP_REASON: ${{ steps.pr-diff.outputs.skip_reason }}
          PROVIDER: ${{ inputs.provider }}
        run: |
          case "$PROVIDER" in
            gemini) LABEL="Gemini" ;;
            openai) LABEL="GLM" ;;
            openrouter) LABEL="OpenRouter" ;;
            nim) LABEL="NVIDIA NIM" ;;
            zen) LABEL="OpenCode Zen" ;;
            *) LABEL="$PROVIDER" ;;
          esac
          { printf '## %s Code Review\n\n:information_source: %s\n' "$LABEL" "$SKIP_REASON"; } > review_report.md

      - name: Post Review Comment
        if: always() && hashFiles('review_report.md') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -s review_report.md ]; then
            gh pr comment "${PR_NUMBER}" --body-file review_report.md
          else
            echo "Review report is empty, skipping comment."
          fi
