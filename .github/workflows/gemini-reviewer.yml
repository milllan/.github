name: Gemini Code Reviewer

# Reusable workflow: other repos reference it via
#   uses: milllan/.github/.github/workflows/gemini-reviewer.yml@main
# A workflow_call-only trigger means this file does NOT run on pull requests
# against the .github repo itself (which has no code to review).
on:
  workflow_call:
    inputs:
      model:
        description: "Gemini model used for the review (e.g. gemini-3.5-flash or gemini-3.1-pro)."
        type: string
        default: "gemini-3.5-flash"
      max_diff_chars:
        description: "Skip the review if the raw diff exceeds this many characters (cost guard). 0 disables the limit."
        type: number
        default: 60000
    secrets:
      GEMINI_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Gemini PR Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history so the base ref is available for an accurate diff.

      # Language detection is retained so later steps (or future tools) can
      # install runtimes. Gemini itself does not need them to review a diff.
      - name: Detect Languages
        id: detect-languages
        run: |
          if [ -f "package.json" ] || [ -f "package-lock.json" ]; then
            echo "has_node=true" >> $GITHUB_OUTPUT
          fi
          if [ -f "requirements.txt" ] || [ -f "pyproject.toml" ] || [ -f "setup.py" ]; then
            echo "has_python=true" >> $GITHUB_OUTPUT
          fi
          if [ -f "go.mod" ]; then
            echo "has_go=true" >> $GITHUB_OUTPUT
          fi
          if [ -f "Cargo.toml" ]; then
            echo "has_rust=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.detect-languages.outputs.has_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        if: steps.detect-languages.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Go
        if: steps.detect-languages.outputs.has_go == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Rust
        if: steps.detect-languages.outputs.has_rust == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Generate PR Diff
        id: pr-diff
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Ensure the base ref exists locally (shallow/PR checkouts can miss it).
          git fetch origin "${BASE_REF}" --depth=1 2>/dev/null || true
          git diff "origin/${BASE_REF}...HEAD" > pr_diff.txt
          if [ ! -s pr_diff.txt ]; then
            echo "Empty diff — nothing to review."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Cost guard: bail on enormous diffs rather than burning the model.
          if [ "${{ inputs.max_diff_chars }}" != "0" ]; then
            size=$(wc -c < pr_diff.txt)
            if [ "$size" -gt "${{ inputs.max_diff_chars }}" ]; then
              echo "Diff is ${size} bytes (limit ${{ inputs.max_diff_chars }}) — skipping review to control cost."
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

      - name: Run Gemini Review
        id: gemini
        if: steps.pr-diff.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODEL: ${{ inputs.model }}
        run: |
          set +e
          # Build the request body with jq so diff contents (quotes, backticks,
          # $, etc.) cannot break JSON parsing or inject into the prompt.
          jq -n --rawfile diff pr_diff.txt '{
            system_instruction: { parts: [ { text: "You are an expert software engineer performing a pull request code review. Be concrete and concise. Output GitHub-flavored Markdown only. Start with a one-line summary, then sections: Critical, Suggestions, Nitpicks. Cite file paths and line ranges from the diff. If you have no concerns in a section, write \"None\". Do not restate the diff." } ] },
            contents: [ { role: "user", parts: [ { text: ("Review the following git diff for bugs, security/safety hazards, performance issues, logic flaws, and coding-standard violations. Suggest concrete fixes with code snippets where useful.\n\n```diff\n" + $diff + "\n```") } ] } ],
            generationConfig: { temperature: 0.2 }
          }' > body.json

          # Non-streaming generateContent; the key is passed as a query param.
          # Retry transient Google-side errors (502/503/504 overload, 429 rate
          # limit) with exponential backoff so a temporary spike doesn't waste
          # a review. Non-transient errors (4xx) fail immediately.
          max_attempts=4
          attempt=1
          http_code=""
          while [ "$attempt" -le "$max_attempts" ]; do
            http_code=$(curl -sS -w "%{http_code}" -o response.json \
              -X POST "https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${GEMINI_API_KEY}" \
              -H 'Content-Type: application/json' \
              -d @body.json)
            if [ "$http_code" = "200" ]; then
              break
            fi
            case "$http_code" in
              429|502|503|504)
                wait_s=$((10 * attempt))
                echo "HTTP $http_code on attempt $attempt/$max_attempts — retrying in ${wait_s}s..."
                sleep "$wait_s"
                attempt=$((attempt + 1))
                ;;
              *)
                break
                ;;
            esac
          done

          if [ "$http_code" != "200" ]; then
            msg=$(jq -r '.error.message // "(no error body)"' response.json 2>/dev/null || head -c 500 response.json)
            printf '## Gemini Code Review\n\n:warning: Gemini API returned HTTP %s after %s attempt(s): %s\n' "$http_code" "$attempt" "$msg" > review_report.md
            echo "status=error" >> $GITHUB_OUTPUT
            exit 0
          fi

          review=$(jq -r '.candidates[0].content.parts[0].text // empty' response.json)
          if [ -z "$review" ]; then
            reason=$(jq -r '.candidates[0].finishReason // .promptFeedback.blockReason // "unknown"' response.json)
            printf '## Gemini Code Review\n\n:warning: Gemini returned no content (finishReason: %s).\n' "$reason" > review_report.md
            echo "status=empty" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Drop the model's leading summary heading duplication if present.
          { printf '## Gemini Code Review\n\n'; printf '%s\n' "$review"; } > review_report.md
          echo "status=ok" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        if: steps.pr-diff.outputs.skip != 'true' && hashFiles('review_report.md') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -s review_report.md ]; then
            gh pr comment "${PR_NUMBER}" --body-file review_report.md
          else
            echo "Review report is empty, skipping comment."
          fi
