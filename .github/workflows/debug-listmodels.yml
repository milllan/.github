name: Debug List Models
on:
  workflow_dispatch:
jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: List available Gemini models
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set +e
          curl -sS "https://generativelanguage.googleapis.com/v1beta/models?pageSize=200&key=${GEMINI_API_KEY}" > models.json
          echo "--- models matching flash/pro/3.x with generateContent support ---"
          jq -r '.models[] | select(.supportedGenerationMethods | index("generateContent")) | .name' models.json | grep -iE "flash|pro|gemini-[23]" | head -40
          echo "--- total count ---"
          jq '.models | length' models.json
